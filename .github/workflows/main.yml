name: Release

on:
  workflow_dispatch:
    inputs:
      note:
        description: '本次发布备注（可选）'
        required: false
        default: ''

env:
  GO_VERSION: '1.21'

jobs:
  # ──────────────────────────────────────────
  # Step 1: 生成时间 tag
  # ──────────────────────────────────────────
  tag:
    name: Generate tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.gen.outputs.tag }}
    steps:
      - name: Generate time tag
        id: gen
        run: |
          TAG="$(TZ=Asia/Shanghai date +'%Y%m%d-%H%M%S')"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${TAG}"

  # ──────────────────────────────────────────
  # Step 2: 生成并提交 go.sum（仅首次或 go.mod 变化时）
  # ──────────────────────────────────────────
  gosum:
    name: Ensure go.sum
    needs: tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if go.sum exists
        id: check
        run: |
          if [ -f go.sum ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Go
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Generate go.sum
        if: steps.check.outputs.exists == 'false'
        run: go mod tidy

      - name: Commit go.sum
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add go.sum
          git commit -m "chore: add go.sum [skip ci]"
          git push

  # ──────────────────────────────────────────
  # Step 3: 多平台静态编译
  # ──────────────────────────────────────────
  build:
    name: Build · ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: [tag, gosum]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            cc: gcc
            apt: build-essential

          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            cc: aarch64-linux-gnu-gcc
            apt: gcc-aarch64-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install cross-compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Vue frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Download dependencies
        run: go mod tidy

      - name: Compute output filename
        id: fname
        shell: bash
        run: |
          NAME="noteos-${{ matrix.goos }}-${{ matrix.goarch }}"
          echo "name=${NAME}" >> $GITHUB_OUTPUT

      - name: Build (Static)
        shell: bash
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC:          ${{ matrix.cc }}
        run: |
          mkdir -p dist
          go build \
            -tags fts5 \
            -ldflags="-s -w -X main.version=${{ needs.tag.outputs.tag }} -linkmode external -extldflags '-static'" \
            -trimpath \
            -o "dist/${{ steps.fname.outputs.name }}" \
            .
          file "dist/${{ steps.fname.outputs.name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/${{ steps.fname.outputs.name }}
          if-no-files-found: error

  # ──────────────────────────────────────────
  # Step 3: 构建 Docker 多架构镜像
  # 使用仓库根目录的 Dockerfile 和 docker-entrypoint.sh
  # ──────────────────────────────────────────
  docker:
    name: Build & Push Docker
    needs: [tag, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download linux/amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: bin-linux-amd64
          path: .   # 放到仓库根目录，与 Dockerfile 同级

      - name: Download linux/arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: bin-linux-arm64
          path: .

      - name: Prepare binaries
        run: |
          chmod +x noteos-linux-amd64 noteos-linux-arm64
          ls -lh noteos-linux-*

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.USER }}
          password: ${{ secrets.PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .                  # 仓库根目录为 context
          file: Dockerfile            # 根目录的 Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          build-args: |
            VERSION=${{ needs.tag.outputs.tag }}
          tags: |
            ${{ secrets.USER }}/noteos:${{ needs.tag.outputs.tag }}
            ${{ secrets.USER }}/noteos:latest

  # ──────────────────────────────────────────
  # Step 4: 创建 Git tag + GitHub Release
  # ──────────────────────────────────────────
  release:
    name: Publish Release
    needs: [tag, build, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: bin-*
          merge-multiple: true

      - name: Show binaries
        run: ls -lh dist/

      - name: Create Git tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.tag.outputs.tag }}"
          git push origin "${{ needs.tag.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          name: "NoteOS ${{ needs.tag.outputs.tag }}"
          body: |
            ${{ github.event.inputs.note != '' && format('> {0}', github.event.inputs.note) || '' }}

            ### Docker

            ```bash
            docker run -d -p 2344:2344 -v ./data:/data \
              -e NOTEOS_AUTH=admin:password \
              ${{ secrets.USER }}/noteos:latest
            ```

            ### 二进制

            ```bash
            chmod +x noteos-linux-amd64
            ./noteos-linux-amd64 --dir ./data
            ```
          files: dist/noteos-*
          draft: false
          prerelease: false
