name: Release

on:
  workflow_dispatch:
    inputs:
      note:
        description: '本次发布备注（可选）'
        required: false
        default: ''

env:
  GO_VERSION: '1.21'

jobs:
  # ──────────────────────────────────────────
  # Step 1: 生成时间 tag
  # ──────────────────────────────────────────
  tag:
    name: Generate tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.gen.outputs.tag }}
    steps:
      - name: Generate time tag
        id: gen
        run: |
          TAG="$(TZ=Asia/Shanghai date +'%Y%m%d-%H%M%S')"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${TAG}"

  # ──────────────────────────────────────────
  # Step 2: 多平台静态编译
  # ──────────────────────────────────────────
  build:
    name: Build · ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: tag
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            cc: gcc
            apt: build-essential

          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            cc: aarch64-linux-gnu-gcc
            apt: gcc-aarch64-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install cross-compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Download dependencies
        run: go mod tidy

      - name: Compute output filename
        id: fname
        shell: bash
        run: |
          NAME="noteos-${{ matrix.goos }}-${{ matrix.goarch }}"
          echo "name=${NAME}" >> $GITHUB_OUTPUT

      - name: Build (Static Linking)
        shell: bash
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC:          ${{ matrix.cc }}
        run: |
          mkdir -p dist
          # 关键修改：通过 -extldflags "-static" 实现完全静态化，适配 Alpine
          go build \
            -tags fts5 \
            -ldflags="-s -w -X main.version=${{ needs.tag.outputs.tag }} -linkmode external -extldflags '-static'" \
            -trimpath \
            -o "dist/${{ steps.fname.outputs.name }}" \
            .
          
          # 验证是否为静态文件 (在日志中查看，不含 dynamic 词汇即成功)
          file "dist/${{ steps.fname.outputs.name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/${{ steps.fname.outputs.name }}
          if-no-files-found: error

  # ──────────────────────────────────────────
  # Step 3: 构建 Docker 多架构镜像
  # ──────────────────────────────────────────
  docker:
    name: Build & Push Docker
    needs: [tag, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: docker-context

      - name: Prepare Docker Context
        run: |
          # 将下载的 artifact 整理到统一目录
          mkdir -p docker
          cp docker-context/bin-linux-amd64/noteos-linux-amd64 docker/noteos-linux-amd64
          cp docker-context/bin-linux-arm64/noteos-linux-arm64 docker/noteos-linux-arm64
          chmod +x docker/noteos-linux-*

      - name: Write Dockerfile
        run: |
          cat > docker/Dockerfile << 'EOF'
          FROM alpine:3.19
          RUN apk add --no-cache ca-certificates tzdata
          ARG TARGETARCH
          # 根据当前构建架构拷贝对应的静态二进制文件
          COPY noteos-linux-${TARGETARCH} /noteos
          RUN chmod +x /noteos
          ENV NOTEOS_AUTH=""
          EXPOSE 2344
          VOLUME ["/data"]
          ENTRYPOINT ["/noteos"]
          CMD ["--dir", "/data", "--port", "2344"]
          EOF

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.USER }}
          password: ${{ secrets.PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ secrets.USER }}/noteos:${{ needs.tag.outputs.tag }}
            ${{ secrets.USER }}/noteos:latest

  # ──────────────────────────────────────────
  # Step 4: 发布 GitHub Release
  # ──────────────────────────────────────────
  release:
    name: Publish Release
    needs: [tag, build, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: bin-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          name: "NoteOS ${{ needs.tag.outputs.tag }}"
          body: |
            ## Release Note
            ${{ github.event.inputs.note }}
            
            ### Docker Image
            `docker pull ${{ secrets.USER }}/noteos:latest`
          files: dist/noteos-*
          draft: false
          prerelease: false
