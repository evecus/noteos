name: Release

on:
  workflow_dispatch:
    inputs:
      note:
        description: '本次发布备注（可选）'
        required: false
        default: ''

env:
  GO_VERSION: '1.21'

jobs:
  # ────────────────────────────────────────────
  # Step 1: generate the time-based tag once,
  # share it with all downstream jobs via output
  # ────────────────────────────────────────────
  tag:
    name: Generate tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.gen.outputs.tag }}
    steps:
      - name: Generate time tag
        id: gen
        run: |
          TAG="$(TZ=Asia/Shanghai date +'%Y%m%d-%H%M%S')"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${TAG}"

  # ────────────────────────────────────────────
  # Step 2: build matrix
  # ────────────────────────────────────────────
  build:
    name: Build · ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: tag
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──────────────────────────
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            cc: ''
            apt: ''

          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            cc: aarch64-linux-gnu-gcc
            apt: gcc-aarch64-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install cross-compiler (Linux runners only)
        if: matrix.apt != ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Download dependencies
        run: go mod tidy

      - name: Compute output filename
        id: fname
        shell: bash
        run: |
          NAME="noteos-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [[ "${{ matrix.goarm }}" != "" ]]; then
            NAME="${NAME}-armv${{ matrix.goarm }}"
          fi
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            NAME="${NAME}.exe"
          fi
          echo "name=${NAME}" >> $GITHUB_OUTPUT

      - name: Build
        shell: bash
        env:
          GOOS:       ${{ matrix.goos }}
          GOARCH:     ${{ matrix.goarch }}
          GOARM:      ${{ matrix.goarm }}
          GOMIPS:     ${{ matrix.gomips }}
          CGO_ENABLED: 1
          CC:         ${{ matrix.cc }}
        run: |
          mkdir -p dist
          go build \
            -tags fts5 \
            -ldflags="-s -w -X main.version=${{ needs.tag.outputs.tag }}" \
            -trimpath \
            -o "dist/${{ steps.fname.outputs.name }}" \
            .
          ls -lh dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/${{ steps.fname.outputs.name }}
          if-no-files-found: error

  # ────────────────────────────────────────────
  # Step 3: create GitHub Release and attach all binaries
  # ────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create tags + releases

    steps:
      - name: Checkout (needed to create the tag)
        uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show binaries
        run: ls -lh dist/

      - name: Create Git tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.tag.outputs.tag }}"
          git push origin "${{ needs.tag.outputs.tag }}"

      - name: Build release body
        id: body
        run: |
          TAG="${{ needs.tag.outputs.tag }}"
          NOTE="${{ github.event.inputs.note }}"
          SHA="${{ github.sha }}"

          cat > body.md << BODY
          ## NoteOS · ${TAG}

          $( [[ -n "${NOTE}" ]] && echo "> ${NOTE}" && echo )
          Commit: \`${SHA:0:7}\` · Built by [@${{ github.actor }}](https://github.com/${{ github.actor }})

          ### 快速启动

          \`\`\`bash
          # Linux amd64
          chmod +x noteos-linux-amd64
          ./noteos-linux-amd64

          # 带密码保护
          ./noteos-linux-amd64 --password yourpassword

          # 自定义端口和数据目录
          ./noteos-linux-amd64 --port 2344 --data /var/lib/noteos
          \`\`\`

          访问 http://localhost:2344

          ### 各平台文件

          | 文件 | 平台 |
          |------|------|
          | \`noteos-linux-amd64\` | Linux x86_64（服务器/VPS） |
          | \`noteos-linux-arm64\` | Linux ARM64（树莓派 4/5、NAS） |
          | \`noteos-linux-arm-armv7\` | Linux ARMv7（树莓派 3、软路由） |
          | \`noteos-linux-mipsle\` | OpenWrt MIPS soft-float（MT7621 等） |
          | \`noteos-darwin-amd64\` | macOS Intel |
          | \`noteos-darwin-arm64\` | macOS Apple Silicon |
          | \`noteos-windows-amd64.exe\` | Windows 64 位 |
          BODY

          echo "Generated body.md"
          cat body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          name: "NoteOS ${{ needs.tag.outputs.tag }}"
          body_path: body.md
          files: dist/noteos-*
          draft: false
          prerelease: false
