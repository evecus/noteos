name: Release

on:
  workflow_dispatch:
    inputs:
      note:
        description: '本次发布备注（可选）'
        required: false
        default: ''

env:
  GO_VERSION: '1.21'

jobs:
  # ──────────────────────────────────────────
  # Step 1: 生成时间 tag，所有后续 job 共用
  # ──────────────────────────────────────────
  tag:
    name: Generate tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.gen.outputs.tag }}
    steps:
      - name: Generate time tag
        id: gen
        run: |
          TAG="$(TZ=Asia/Shanghai date +'%Y%m%d-%H%M%S')"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${TAG}"

  # ──────────────────────────────────────────
  # Step 2: 多平台编译（矩阵）
  # ──────────────────────────────────────────
  build:
    name: Build · ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: tag
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            cc: ''
            apt: ''

          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            cc: aarch64-linux-gnu-gcc
            apt: gcc-aarch64-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install cross-compiler
        if: matrix.apt != ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Download dependencies
        run: go mod tidy

      - name: Compute output filename
        id: fname
        shell: bash
        run: |
          NAME="noteos-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [[ "${{ matrix.goarm }}" != "" ]]; then
            NAME="${NAME}-armv${{ matrix.goarm }}"
          fi
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            NAME="${NAME}.exe"
          fi
          echo "name=${NAME}" >> $GITHUB_OUTPUT

      - name: Build
        shell: bash
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          GOARM:       ${{ matrix.goarm }}
          GOMIPS:      ${{ matrix.gomips }}
          CGO_ENABLED: 1
          CC:          ${{ matrix.cc }}
        run: |
          mkdir -p dist
          go build \
            -tags fts5 \
            -ldflags="-s -w -X main.version=${{ needs.tag.outputs.tag }}" \
            -trimpath \
            -o "dist/${{ steps.fname.outputs.name }}" \
            .
          ls -lh dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/${{ steps.fname.outputs.name }}
          if-no-files-found: error

  # ──────────────────────────────────────────
  # Step 3: 构建 Docker 多架构镜像并推送 DockerHub
  # 直接复用 Step 2 产出的 linux/amd64 和 linux/arm64 二进制
  # ──────────────────────────────────────────
  docker:
    name: Build & Push Docker
    needs: [tag, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download linux/amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: bin-linux-amd64
          path: docker/amd64

      - name: Download linux/arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: bin-linux-arm64
          path: docker/arm64

      - name: Prepare binaries
        run: |
          chmod +x docker/amd64/noteos-linux-amd64
          chmod +x docker/arm64/noteos-linux-arm64
          ls -lh docker/amd64/ docker/arm64/

      - name: Write Dockerfile
        run: |
          cat > docker/Dockerfile << 'EOF'
          FROM alpine:3.19
          RUN apk add --no-cache ca-certificates tzdata
          ARG TARGETARCH
          COPY noteos-linux-${TARGETARCH} /noteos
          RUN chmod +x /noteos
          ENV NOTEOS_AUTH=""
          EXPOSE 2344
          VOLUME ["/data"]
          ENTRYPOINT ["/noteos"]
          CMD ["--dir", "/data", "--port", "2344"]
          EOF

      - name: Flatten binaries into docker context
        run: |
          cp docker/amd64/noteos-linux-amd64 docker/noteos-linux-amd64
          cp docker/arm64/noteos-linux-arm64 docker/noteos-linux-arm64
          ls -lh docker/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.USER }}
          password: ${{ secrets.PASSWORD }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ secrets.USER }}/noteos:${{ needs.tag.outputs.tag }}
            ${{ secrets.USER }}/noteos:latest
          labels: |
            org.opencontainers.image.version=${{ needs.tag.outputs.tag }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ needs.tag.outputs.tag }}

  # ──────────────────────────────────────────
  # Step 4: 创建 GitHub Release，附上所有二进制
  # ──────────────────────────────────────────
  release:
    name: Publish Release
    needs: [tag, build, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: bin-*
          merge-multiple: true

      - name: Show binaries
        run: ls -lh dist/

      - name: Create Git tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.tag.outputs.tag }}"
          git push origin "${{ needs.tag.outputs.tag }}"

      - name: Build release body
        run: |
          TAG="${{ needs.tag.outputs.tag }}"
          NOTE="${{ github.event.inputs.note }}"
          SHA="${{ github.sha }}"
          DOCKER_USER="${{ vars.user }}"

          cat > body.md << BODY
          ## NoteOS · ${TAG}

          $([ -n "${NOTE}" ] && echo "> ${NOTE}" && echo)
          Commit: \`${SHA:0:7}\` · Built by [@${{ github.actor }}](https://github.com/${{ github.actor }})

          ### Docker 快速启动

          \`\`\`bash
          # 直接运行（无认证）
          docker run -d -p 2344:2344 -v ./data:/data ${DOCKER_USER}/noteos:latest

          # 带密码保护
          docker run -d -p 2344:2344 -v ./data:/data ${DOCKER_USER}/noteos:latest --auth noteos:mypassword

          # 指定版本
          docker run -d -p 2344:2344 -v ./data:/data ${DOCKER_USER}/noteos:${TAG}
          \`\`\`

          ### 二进制快速启动

          \`\`\`bash
          chmod +x noteos-linux-amd64
          ./noteos-linux-amd64 --dir ./data
          \`\`\`

          访问 http://localhost:2344

          ### Docker 镜像

          | 镜像 | 架构 |
          |------|------|
          | \`${DOCKER_USER}/noteos:latest\` | linux/amd64, linux/arm64 |
          | \`${DOCKER_USER}/noteos:${TAG}\` | linux/amd64, linux/arm64 |

          ### 各平台二进制

          | 文件 | 平台 |
          |------|------|
          | \`noteos-linux-amd64\` | Linux x86_64 |
          | \`noteos-linux-arm64\` | Linux ARM64（树莓派 4/5、NAS） |
          BODY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          name: "NoteOS ${{ needs.tag.outputs.tag }}"
          body_path: body.md
          files: dist/noteos-*
          draft: false
          prerelease: false
