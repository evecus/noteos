<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>编辑笔记 · NoteOS</title>
<link rel="icon" type="image/svg+xml" href="/static/icon.svg"/>
<link rel="stylesheet" href="/static/app.css"/>
<style>
/* ===== 全屏编辑布局 ===== */
html, body { height: 100%; overflow: hidden; }

#page {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  background: var(--bg);
}

/* ===== 顶部栏 ===== */
#topbar {
  display: flex;
  align-items: center;
  gap: 8px;
  height: 56px;
  padding-top: var(--safe-top);
  padding-left: max(16px, var(--safe-left));
  padding-right: max(16px, var(--safe-right));
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.topbar-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 12px;
  border: none;
  border-radius: 9px;
  background: transparent;
  color: var(--text2);
  font-size: 14px;
  font-family: var(--font);
  cursor: pointer;
  transition: background .15s, color .15s;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
  font-weight: 500;
}
.topbar-btn svg { width: 18px; height: 18px; fill: currentColor; flex-shrink: 0; }
.topbar-btn:hover { background: var(--bg3); color: var(--text); }
.topbar-btn:active { background: var(--border); }
.topbar-btn.primary {
  background: var(--accent);
  color: white;
  padding: 7px 18px;
}
.topbar-btn.primary:hover { opacity: .88; background: var(--accent); }
.topbar-btn.primary:disabled { opacity: .5; cursor: not-allowed; }
.topbar-btn.danger { color: var(--danger); }
.topbar-btn.danger:hover { background: #fee2e2; }
.topbar-spacer { flex: 1; }
.topbar-actions { display: flex; align-items: center; gap: 4px; }

/* ===== 编辑区 ===== */
#editor-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 0 24px 0;
  padding-bottom: max(16px, var(--safe-bottom));
  max-width: 820px;
  width: 100%;
  margin: 0 auto;
  box-sizing: border-box;
  gap: 0;
}

/* 标题输入 */
#input-title {
  width: 100%;
  border: none;
  border-bottom: 1.5px solid var(--border);
  border-radius: 0;
  padding: 20px 0 14px;
  font-size: 22px;
  font-weight: 700;
  font-family: var(--font);
  background: transparent;
  color: var(--text);
  outline: none;
  transition: border-color .15s;
  letter-spacing: -.015em;
  flex-shrink: 0;
}
#input-title::placeholder { color: var(--text3); font-weight: 400; font-size: 20px; }
#input-title:focus { border-bottom-color: var(--accent); }

/* 标签行 */
#tags-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
  padding: 10px 0 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  min-height: 42px;
}
#tags-row input {
  border: none;
  outline: none;
  background: transparent;
  font-size: 13px;
  color: var(--text2);
  min-width: 0;
  flex: 1 1 140px;
  font-family: var(--font);
}
#tags-row input::placeholder { color: var(--text3); }
.chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--accent-light);
  color: var(--accent);
  border-radius: 6px;
  padding: 3px 8px;
  font-size: 12px;
  font-weight: 500;
  flex-shrink: 0;
}
.chip .remove { cursor: pointer; opacity: .6; line-height: 1; font-size: 13px; }
.chip .remove:hover { opacity: 1; }

/* 工具栏（置顶 + 附件）*/
#edit-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.edit-tool-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: 7px;
  background: var(--bg2);
  color: var(--text2);
  font-size: 13px;
  font-family: var(--font);
  cursor: pointer;
  transition: background .15s, color .15s;
  -webkit-tap-highlight-color: transparent;
}
.edit-tool-btn svg { width: 15px; height: 15px; fill: currentColor; flex-shrink: 0; }
.edit-tool-btn:hover { background: var(--bg3); }
.edit-tool-btn.active { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }

/* 正文 textarea */
#input-content {
  flex: 1;
  width: 100%;
  border: none;
  outline: none;
  resize: none;
  font-size: 15px;
  font-family: var(--font);
  line-height: 1.75;
  background: transparent;
  color: var(--text);
  padding: 16px 0 20px;
  -webkit-overflow-scrolling: touch;
  overflow-y: auto;
}
#input-content::placeholder { color: var(--text3); }

/* 附件预览区 */
#files-area {
  flex-shrink: 0;
  padding: 8px 0;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.edit-img-wrap { position: relative; display: inline-block; }
.edit-img-wrap img {
  width: 72px; height: 72px;
  object-fit: cover;
  border-radius: 8px;
  border: 1px solid var(--border);
  display: block;
}
.img-remove {
  position: absolute; top: -6px; right: -6px;
  width: 18px; height: 18px;
  background: var(--danger); color: white;
  border-radius: 50%; border: none;
  cursor: pointer; font-size: 11px;
  display: flex; align-items: center; justify-content: center;
  line-height: 1;
}
.edit-att-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; min-width: 160px; max-width: 260px;
}
.att-icon-sm {
  width: 28px; height: 28px; border-radius: 5px;
  background: var(--accent-light); color: var(--accent);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.att-icon-sm svg { width: 15px; height: 15px; fill: currentColor; }
.att-meta { flex: 1; min-width: 0; }
.att-name { font-size: 12px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.att-size { font-size: 11px; color: var(--text3); }
.att-del { border: none; background: transparent; color: var(--text3); cursor: pointer; padding: 2px; flex-shrink: 0; }
.att-del:hover { color: var(--danger); }
.att-del svg { width: 14px; height: 14px; fill: currentColor; display: block; }

/* 拖拽区 */
#drop-zone {
  border: 2px dashed var(--border);
  border-radius: 10px;
  padding: 14px;
  text-align: center;
  color: var(--text3);
  font-size: 13px;
  cursor: pointer;
  transition: border-color .15s, background .15s;
  flex-shrink: 0;
  margin-top: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
#drop-zone svg { width: 18px; height: 18px; fill: var(--text3); }
#drop-zone:hover, #drop-zone.drag-over { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
#drop-zone input { display: none; }

/* 移动端 */
@media (max-width: 768px) {
  #editor-wrap { padding: 0 14px; padding-bottom: max(16px, var(--safe-bottom)); }
  #input-title { font-size: 19px; padding: 16px 0 12px; }
  #input-content { font-size: 15px; }
  .topbar-btn span { display: none; }
  .topbar-btn { padding: 8px; }
  .topbar-btn.primary { padding: 8px 14px; }
  .topbar-btn.primary span { display: inline; }
}
</style>
</head>
<body>
<div id="page">
  <div id="topbar">
    <button class="topbar-btn" onclick="goBack()">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      <span>返回</span>
    </button>
    <div class="topbar-spacer"></div>
    <div class="topbar-actions">
      <button class="topbar-btn danger" id="btn-delete" onclick="deleteNote()" style="display:none">
        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
        <span>删除</span>
      </button>
      <button class="topbar-btn primary" id="btn-save" onclick="saveNote()">
        <svg viewBox="0 0 24 24"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z" fill="white"/></svg>
        <span>保存</span>
      </button>
    </div>
  </div>

  <div id="editor-wrap">
    <input id="input-title" type="text" placeholder="标题（选填）" autocomplete="off"/>

    <div id="tags-row">
      <input id="tag-input" placeholder="添加标签，回车确认" autocomplete="off"/>
    </div>

    <div id="edit-toolbar">
      <label class="edit-tool-btn" id="pin-btn" title="置顶">
        <input type="checkbox" id="pin-check" style="display:none" onchange="updatePinBtn()"/>
        <svg viewBox="0 0 24 24"><path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"/></svg>
        <span id="pin-label">置顶</span>
      </label>
      <label class="edit-tool-btn" title="上传附件" style="cursor:pointer">
        <input type="file" accept="*" multiple style="display:none" id="file-input" onchange="handleFileUpload(event)"/>
        <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
        <span>附件</span>
      </label>
    </div>

    <textarea id="input-content" placeholder="写下你的想法，支持 Markdown…"></textarea>

    <div id="files-area"></div>

    <label id="drop-zone">
      <input type="file" accept="*" multiple onchange="handleFileUpload(event)"/>
      <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
      <span>点击或拖拽上传附件（最大 50MB）</span>
    </label>
  </div>
</div>

<script>
if (localStorage.getItem('noteos-dark') === '1') document.body.classList.add('dark');

// ===== 工具 =====
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formatSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}
function getCsrfToken() {
  return document.cookie.split(';').map(c=>c.trim())
    .find(c=>c.startsWith('csrf_token='))?.split('=')[1] || '';
}
function toast(msg) {
  let el = document.getElementById('_toast');
  if (!el) {
    el = document.createElement('div');
    el.id = '_toast';
    Object.assign(el.style, {
      position:'fixed', bottom:'24px', left:'50%',
      transform:'translateX(-50%) translateY(80px)',
      background:'#222', color:'#fff', padding:'10px 20px',
      borderRadius:'20px', fontSize:'14px', zIndex:'300',
      transition:'transform .28s cubic-bezier(.34,1.56,.64,1)',
      pointerEvents:'none', whiteSpace:'nowrap'
    });
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.transform = 'translateX(-50%) translateY(80px)'; }, 2600);
}

// ===== 路由 =====
const pathMatch = location.pathname.match(/\/notes\/(\d+)\/edit/);
const NOTE_ID = pathMatch ? parseInt(pathMatch[1]) : null;
const IS_NEW = !NOTE_ID;

// ===== 状态 =====
let tags = [];
let noteData = null; // 原始笔记数据（编辑模式）
let pendingFiles = []; // 新建模式下待上传的文件

// ===== 初始化 =====
async function init() {
  if (IS_NEW) {
    // 新建模式
    document.title = '新建笔记 · NoteOS';
    document.getElementById('input-content').focus();
    return;
  }
  // 编辑模式：加载已有笔记
  document.getElementById('btn-delete').style.display = '';
  try {
    const r = await fetch(`/api/v1/notes/${NOTE_ID}`);
    if (r.status === 401) { location.href = '/login'; return; }
    if (!r.ok) throw new Error('加载失败');
    noteData = await r.json();
    document.title = '编辑笔记 · NoteOS';
    document.getElementById('input-title').value = noteData.title || '';
    document.getElementById('input-content').value = noteData.content || '';
    document.getElementById('pin-check').checked = noteData.pinned || false;
    updatePinBtn();
    tags = [...(noteData.tags || [])];
    renderTagChips();
    renderFiles(noteData.files || [], noteData.images || []);
  } catch(e) {
    toast('加载失败: ' + e.message);
  }
}

// ===== 标签 =====
function renderTagChips() {
  const row = document.getElementById('tags-row');
  // 移除旧 chip
  row.querySelectorAll('.chip').forEach(el => el.remove());
  // 重新插入（在 input 前）
  const input = document.getElementById('tag-input');
  tags.forEach((t, i) => {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.innerHTML = `#${escHtml(t)}<span class="remove" onclick="removeTag(${i})">×</span>`;
    row.insertBefore(chip, input);
  });
}
function removeTag(i) { tags.splice(i, 1); renderTagChips(); }
document.getElementById('tag-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value.trim().replace(/^#/, '');
    if (val && !tags.includes(val)) { tags.push(val); renderTagChips(); }
    e.target.value = '';
  }
});

// ===== 置顶 =====
function updatePinBtn() {
  const checked = document.getElementById('pin-check').checked;
  const btn = document.getElementById('pin-btn');
  document.getElementById('pin-label').textContent = checked ? '已置顶' : '置顶';
  btn.classList.toggle('active', checked);
}

// ===== 文件渲染 =====
function renderFiles(files, legacyImages) {
  const area = document.getElementById('files-area');
  const images = [
    ...(legacyImages||[]).map(img=>({filename:img,orig_name:img,size:0,mime:'image/jpeg',_legacy:true})),
    ...(files||[]).filter(f=>f.mime&&f.mime.startsWith('image/')),
  ];
  const others = (files||[]).filter(f=>f.mime&&!f.mime.startsWith('image/'));

  let html = '';
  images.forEach(f => {
    html += `<div class="edit-img-wrap">
      <img src="/uploads/${escHtml(f.filename)}" loading="lazy"/>
      <button class="img-remove" onclick="deleteFile('${escHtml(f.filename)}')">×</button>
    </div>`;
  });
  others.forEach(f => {
    html += `<div class="edit-att-row">
      <div class="att-icon-sm">${fileIcon(f.mime)}</div>
      <div class="att-meta">
        <div class="att-name">${escHtml(f.orig_name)}</div>
        <div class="att-size">${formatSize(f.size)}</div>
      </div>
      <button class="att-del" onclick="deleteFile('${escHtml(f.filename)}')" title="删除">
        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      </button>
    </div>`;
  });

  // 新建模式下的 pending 文件
  pendingFiles.forEach((f, i) => {
    if (f.type.startsWith('image/')) {
      html += `<div class="edit-img-wrap">
        <img src="${URL.createObjectURL(f)}" loading="lazy"/>
        <button class="img-remove" onclick="removePending(${i})">×</button>
      </div>`;
    } else {
      html += `<div class="edit-att-row">
        <div class="att-icon-sm">${fileIcon(f.type)}</div>
        <div class="att-meta">
          <div class="att-name">${escHtml(f.name)}</div>
          <div class="att-size">${formatSize(f.size)}</div>
        </div>
        <button class="att-del" onclick="removePending(${i})" title="删除">
          <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
        </button>
      </div>`;
    }
  });

  area.innerHTML = html;
}

function fileIcon(mime) {
  if (!mime) return docSvg();
  if (mime === 'application/pdf') return `<svg viewBox="0 0 24 24"><path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8.5 7.5c0 .83-.67 1.5-1.5 1.5H9v2H7.5V7H10c.83 0 1.5.67 1.5 1.5v1zm5 2c0 .83-.67 1.5-1.5 1.5h-2.5V7H15c.83 0 1.5.67 1.5 1.5v3zm4-3H19v1h1.5V11H19v2h-1.5V7h3v1.5z" fill="currentColor"/></svg>`;
  if (mime.startsWith('text/')) return `<svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z" fill="currentColor"/></svg>`;
  return docSvg();
}
function docSvg() { return `<svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z" fill="currentColor"/></svg>`; }

// ===== 文件上传 =====
async function handleFileUpload(e) {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  e.target.value = '';
  if (IS_NEW || !NOTE_ID) {
    pendingFiles.push(...files);
    renderFiles([], []);
    return;
  }
  for (const f of files) {
    try {
      const fd = new FormData(); fd.append('file', f);
      const r = await fetch(`/api/v1/notes/${NOTE_ID}/files`, {
        method: 'POST',
        headers: { 'X-CSRF-Token': getCsrfToken() },
        body: fd
      });
      if (!r.ok) throw new Error(await r.text());
    } catch(err) { toast('上传失败: ' + err.message); }
  }
  const fresh = await fetch(`/api/v1/notes/${NOTE_ID}`).then(r=>r.json());
  noteData = fresh;
  renderFiles(fresh.files || [], fresh.images || []);
  toast('✅ 文件已上传');
}
function removePending(i) { pendingFiles.splice(i, 1); renderFiles([], []); }
async function deleteFile(filename) {
  if (!NOTE_ID || !confirm('确认删除该附件？')) return;
  try {
    const r = await fetch(`/api/v1/notes/${NOTE_ID}/files/${encodeURIComponent(filename)}`, {
      method: 'DELETE', headers: { 'X-CSRF-Token': getCsrfToken() }
    });
    if (!r.ok) throw new Error('删除失败');
    const fresh = await fetch(`/api/v1/notes/${NOTE_ID}`).then(r=>r.json());
    noteData = fresh;
    renderFiles(fresh.files || [], fresh.images || []);
    toast('附件已删除');
  } catch(e) { toast(e.message); }
}

// 拖拽上传
const dz = document.getElementById('drop-zone');
['dragenter','dragover'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.add('drag-over'); }));
['dragleave','drop'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.remove('drag-over'); }));
dz.addEventListener('drop', e => handleFileUpload({ target: { files: e.dataTransfer.files, value: '' } }));

// ===== 保存 =====
async function saveNote() {
  const content = document.getElementById('input-content').value.trim();
  if (!content) { toast('内容不能为空'); return; }
  const title  = document.getElementById('input-title').value.trim();
  const pinned = document.getElementById('pin-check').checked;
  const btn = document.getElementById('btn-save');
  btn.disabled = true;

  try {
    if (IS_NEW) {
      const r = await fetch('/api/v1/notes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': getCsrfToken() },
        body: JSON.stringify({ title, content, tags, pinned })
      });
      if (!r.ok) throw new Error(await r.text());
      const note = await r.json();
      // 上传 pending 文件
      for (const f of pendingFiles) {
        try {
          const fd = new FormData(); fd.append('file', f);
          await fetch(`/api/v1/notes/${note.id}/files`, {
            method:'POST', headers:{'X-CSRF-Token':getCsrfToken()}, body: fd
          });
        } catch(e) { toast('文件上传失败: ' + e.message); }
      }
      location.href = `/notes/${note.id}/view`;
    } else {
      const r = await fetch(`/api/v1/notes/${NOTE_ID}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': getCsrfToken() },
        body: JSON.stringify({ title, content, tags, pinned })
      });
      if (!r.ok) throw new Error(await r.text());
      location.href = `/notes/${NOTE_ID}/view`;
    }
  } catch(e) {
    toast('保存失败: ' + e.message);
    btn.disabled = false;
  }
}

// ===== 删除 =====
async function deleteNote() {
  if (!confirm('确认删除这条笔记？')) return;
  try {
    const r = await fetch(`/api/v1/notes/${NOTE_ID}`, {
      method: 'DELETE', headers: { 'X-CSRF-Token': getCsrfToken() }
    });
    if (!r.ok) throw new Error('删除失败');
    location.href = '/';
  } catch(e) { toast('删除失败: ' + e.message); }
}

// ===== 返回 =====
function goBack() {
  if (NOTE_ID) location.href = `/notes/${NOTE_ID}/view`;
  else if (history.length > 1) history.back();
  else location.href = '/';
}

// ===== 快捷键 =====
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') saveNote();
  if (e.key === 'Escape') goBack();
});

// ===== 启动 =====
init();
</script>
</body>
</html>
