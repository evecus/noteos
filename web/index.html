<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>NoteOS</title>

<!-- ===== Favicon / Browser Tab ===== -->
<link rel="icon" type="image/svg+xml" href="/static/icon.svg"/>
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png"/>
<link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png"/>
<link rel="shortcut icon" href="/static/favicon.ico"/>

<!-- ===== Apple / iOS ===== -->
<link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="NoteOS"/>

<!-- ===== Android / PWA ===== -->
<link rel="manifest" href="/static/manifest.json"/>
<meta name="theme-color" content="#5B63D3" media="(prefers-color-scheme: light)"/>
<meta name="theme-color" content="#3a3f8a" media="(prefers-color-scheme: dark)"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="application-name" content="NoteOS"/>

<!-- ===== Open Graph ===== -->
<meta property="og:title" content="NoteOS"/>
<meta property="og:description" content="轻量级网页笔记"/>
<meta property="og:image" content="/static/icon-512.png"/>

<!-- ===== Inline SVG favicon fallback (最兼容) ===== -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%235B63D3'/><stop offset='100%25' stop-color='%237C4FC5'/></linearGradient><clipPath id='c'><rect width='512' height='512' rx='112'/></clipPath></defs><g clip-path='url(%23c)'><rect width='512' height='512' fill='url(%23g)'/><rect x='100' y='88' width='308' height='342' rx='28' fill='white' opacity='.96'/><polygon points='306,88 408,88 408,168' fill='%23DDD8FF' opacity='.5'/><rect x='138' y='198' width='176' height='11' rx='5' fill='%235C63D3' opacity='.55'/><rect x='138' y='224' width='228' height='8' rx='4' fill='%235C63D3' opacity='.28'/><rect x='138' y='246' width='196' height='8' rx='4' fill='%235C63D3' opacity='.25'/><g transform='translate(256,256) rotate(-38) translate(-256,-256)'><rect x='245' y='148' width='22' height='18' rx='4' fill='%23D8D8D8'/><rect x='245' y='166' width='22' height='122' rx='3' fill='%23FFD166'/><polygon points='245,288 267,288 256,324' fill='%23F0A742'/><polygon points='250,316 262,316 256,332' fill='%232A2A2A'/></g></g></svg>"/>

<link rel="stylesheet" href="/static/app.css"/>
</head>
<body>
<div id="app">
  <!-- ===== Sidebar ===== -->
  <aside id="sidebar">
    <div class="logo">
      <img src="/static/icon.svg" class="logo-img" alt="NoteOS"/>
      <span class="logo-text">NoteOS</span>
    </div>
    <nav>
      <a class="nav-item active" data-view="all" onclick="setView('all', this)">
        <svg viewBox="0 0 24 24"><path d="M3 9h14V7H3v2zm0 4h14v-2H3v2zm0 4h14v-2H3v2zm16 0h2v-2h-2v2zm0-10v2h2V7h-2zm0 6h2v-2h-2v2z"/></svg>
        全部笔记
      </a>
      <a class="nav-item" data-view="pinned" onclick="setView('pinned', this)">
        <svg viewBox="0 0 24 24"><path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"/></svg>
        已置顶
      </a>
    </nav>
    <div class="sidebar-section">
      <div class="sidebar-label">标签</div>
      <div id="tag-list"></div>
    </div>
    <div class="sidebar-footer">
      <button onclick="exportMarkdown()" class="btn-ghost">
        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        导出 Markdown
      </button>
      <button onclick="toggleDark()" class="btn-ghost" id="dark-btn">
        <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
        暗色模式
      </button>
      <button onclick="logout()" class="btn-ghost btn-logout" id="logout-btn" style="display:none">
        <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
        退出登录
      </button>
    </div>
  </aside>

  <!-- ===== Mobile Header ===== -->
  <header id="mobile-header">
    <button id="mobile-menu-btn" onclick="toggleMobileSidebar()" aria-label="菜单">
      <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </button>
    <div class="mobile-logo">
      <img src="/static/icon.svg" alt="NoteOS"/>
      <span>NoteOS</span>
    </div>
    <button id="mobile-search-btn" onclick="toggleMobileSearch()" aria-label="搜索">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    </button>
  </header>

  <!-- Mobile sidebar overlay -->
  <div id="mobile-overlay" onclick="toggleMobileSidebar()"></div>

  <!-- ===== Main ===== -->
  <main id="main">
    <!-- Compose -->
    <div id="compose-card">
      <textarea id="compose-input" placeholder="有什么想法？支持 Markdown 语法..." rows="3" oninput="autoResize(this)" onkeydown="composeKeydown(event)"></textarea>
      <div id="compose-images" class="image-preview-row"></div>
      <div id="compose-tags-row" class="tag-input-row">
        <input id="tag-input" placeholder="添加标签，回车确认" onkeydown="tagKeydown(event)"/>
        <div id="compose-tag-chips"></div>
      </div>
      <div class="compose-actions">
        <label class="btn-icon" title="上传图片">
          <input type="file" accept="*" multiple onchange="stagePendingFiles(event)" style="display:none"/>
          <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
        </label>
        <label class="pin-toggle" title="置顶">
          <input type="checkbox" id="compose-pin"/>
          <svg viewBox="0 0 24 24"><path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"/></svg>
        </label>
        <div style="flex:1"></div>
        <span class="compose-hint">Ctrl+Enter</span>
        <button id="compose-btn" onclick="submitNote()">发布</button>
      </div>
    </div>

    <!-- Toolbar -->
    <div id="toolbar">
      <div class="search-wrap" id="search-wrap">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input id="search-input" placeholder="搜索笔记..." oninput="debounceSearch()" />
        <button id="search-close" onclick="closeMobileSearch()" style="display:none">✕</button>
      </div>
      <span id="note-count" class="note-count"></span>
    </div>

    <!-- Notes grid -->
    <div id="notes-grid"></div>
    <div id="load-more-wrap">
      <button id="load-more-btn" onclick="loadMore()" style="display:none">加载更多</button>
    </div>
    <div id="empty-state" style="display:none">
      <div class="empty-icon">📭</div>
      <div>还没有笔记，写下第一条吧！</div>
    </div>
  </main>

  <!-- Mobile FAB -->
  <button id="fab" onclick="focusCompose()" aria-label="新建笔记">
    <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
  </button>
</div>

<!-- Edit Modal -->
<div id="modal-overlay" onclick="closeModal()" style="display:none"></div>
<div id="edit-modal" style="display:none">
  <div class="modal-header">
    <span>编辑笔记</span>
    <button onclick="closeModal()" class="btn-icon">✕</button>
  </div>

  <!-- Content textarea -->
  <textarea id="edit-input" rows="6" placeholder="笔记内容，支持 Markdown..."></textarea>

  <!-- Tags -->
  <div class="tag-input-row">
    <input id="edit-tag-input" placeholder="添加标签，回车确认" onkeydown="editTagKeydown(event)"/>
    <div id="edit-tag-chips"></div>
  </div>

  <!-- Attachments section -->
  <div class="edit-section-label">
    <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
    附件
  </div>
  <div id="edit-files"></div>

  <!-- Upload drop zone -->
  <label class="edit-drop-zone" id="edit-drop-zone">
    <input type="file" accept="*" multiple onchange="uploadEditFiles(event)" style="display:none" id="edit-file-input"/>
    <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
    <span>点击或拖拽上传文件</span>
    <span class="drop-hint">图片 · PDF · 文档 · 压缩包 · 视频…最大 50MB</span>
  </label>

  <!-- Footer -->
  <div class="modal-footer">
    <label class="pin-toggle">
      <input type="checkbox" id="edit-pin"/>
      <svg viewBox="0 0 24 24"><path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"/></svg>
      置顶
    </label>
    <div style="flex:1"></div>
    <button onclick="closeModal()" class="btn-secondary">取消</button>
    <button onclick="saveEdit()">保存</button>
  </div>
</div>

<script>
(function(){
  const e=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  window.marked={parse:function(src){
    if(!src)return'';
    let s=src;
    s=s.replace(/```(\w*)\n([\s\S]*?)```/g,(_,lang,code)=>`<pre><code class="language-${e(lang)}">${e(code.trim())}</code></pre>`);
    s=s.replace(/`([^`]+)`/g,(_,c)=>`<code>${e(c)}</code>`);
    s=s.replace(/^### (.+)$/gm,(_,t)=>`<h3>${t}</h3>`);
    s=s.replace(/^## (.+)$/gm,(_,t)=>`<h2>${t}</h2>`);
    s=s.replace(/^# (.+)$/gm,(_,t)=>`<h1>${t}</h1>`);
    s=s.replace(/^> (.+)$/gm,(_,t)=>`<blockquote>${t}</blockquote>`);
    s=s.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
    s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    s=s.replace(/\*(.+?)\*/g,'<em>$1</em>');
    s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
    s=s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1"/>');
    s=s.replace(/^- \[x\] (.+)$/gm,'<li><input type="checkbox" checked disabled/> $1</li>');
    s=s.replace(/^- \[ \] (.+)$/gm,'<li><input type="checkbox" disabled/> $1</li>');
    s=s.replace(/^[*\-] (.+)$/gm,'<li>$1</li>');
    s=s.replace(/(<li>[\s\S]+?<\/li>)/g,'<ul>$1</ul>');
    s=s.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
    s=s.replace(/^---+$/gm,'<hr/>');
    s=s.replace(/\n\n+/g,'\n\n');
    const lines=s.split('\n');
    const out=[];let inPre=false;
    for(const l of lines){
      if(l.startsWith('<pre')){inPre=true;}
      if(l.startsWith('</pre')){inPre=false;out.push(l);continue;}
      if(inPre){out.push(l);continue;}
      if(l.startsWith('<h')||l.startsWith('<ul')||l.startsWith('<ol')||l.startsWith('<li')||l.startsWith('<blockquote')||l.startsWith('<hr')||l===''||l.startsWith('<img')){
        out.push(l);
      } else {
        out.push('<p>'+l+'</p>');
      }
    }
    return out.join('\n');
  }};
})();
</script>
<script src="/static/app.js"></script>
</body>
</html>
