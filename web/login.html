<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>登录 · NoteOS</title>
<link rel="icon" type="image/svg+xml" href="/static/icon.svg"/>
<link rel="stylesheet" href="/static/login.css"/>
</head>
<body>

<!-- 背景装饰 -->
<div class="bg-shapes" aria-hidden="true">
  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>
  <div class="shape shape-3"></div>
</div>

<main class="login-wrap">
  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <div class="logo-icon-wrap">
        <img src="/static/icon.svg" alt="NoteOS"/>
      </div>
      <h1>NoteOS</h1>
      <p class="login-sub">欢迎回来，请登录以继续</p>
    </div>

    <!-- Form -->
    <form id="login-form" onsubmit="handleLogin(event)" autocomplete="on" novalidate>

      <div class="field" id="field-user">
        <label for="username">用户名</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24">
            <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
          </svg>
          <input id="username" name="username" type="text"
                 placeholder="输入用户名"
                 autocomplete="username"
                 autofocus
                 oninput="clearError()"/>
        </div>
      </div>

      <div class="field" id="field-pass">
        <label for="password">密码</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24">
            <path d="M18 8h-1V6c0-2.8-2.2-5-5-5S7 3.2 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.7 1.4-3.1 3.1-3.1 1.7 0 3.1 1.4 3.1 3.1v2z"/>
          </svg>
          <input id="password" name="password" type="password"
                 placeholder="输入密码"
                 autocomplete="current-password"
                 oninput="clearError()"/>
          <button type="button" class="toggle-pass" onclick="togglePassword()" tabindex="-1" aria-label="显示/隐藏密码">
            <svg id="eye-show" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.7 7.6 1 12c1.7 4.4 6 7.5 11 7.5s9.3-3.1 11-7.5c-1.7-4.4-6-7.5-11-7.5zm0 12.5c-2.8 0-5-2.2-5-5s2.2-5 5-5 5 2.2 5 5-2.2 5-5 5zm0-8c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3z"/></svg>
            <svg id="eye-hide" viewBox="0 0 24 24" style="display:none"><path d="M12 7c2.8 0 5 2.2 5 5 0 .6-.1 1.2-.4 1.8l2.9 2.9c1.5-1.3 2.7-2.9 3.4-4.7C21.3 7.6 17 4.5 12 4.5c-1.3 0-2.5.2-3.7.6l2.2 2.2c.5-.2 1-.3 1.5-.3zM2 4.3l2.3 2.3.5.5C3.1 8.4 1.8 10.1 1 12c1.7 4.4 6 7.5 11 7.5 1.5 0 3-.3 4.4-.8l.4.4 2.9 2.9 1.3-1.3L3.3 3 2 4.3zm5.5 5.5l1.6 1.6c-.1.2-.1.4-.1.6 0 1.7 1.3 3 3 3 .2 0 .4 0 .6-.1l1.6 1.6c-.7.3-1.4.5-2.2.5-2.8 0-5-2.2-5-5 0-.8.2-1.5.5-2.2zm4.3-.8 3.2 3.2V12c0-1.7-1.3-3-3-3h-.2z"/></svg>
          </button>
        </div>
      </div>

      <!-- Error -->
      <div class="login-error" id="login-error" role="alert" aria-live="polite"></div>

      <!-- Submit -->
      <button type="submit" class="login-btn" id="login-btn">
        <span id="btn-text">登录</span>
        <span id="btn-spinner" class="spinner" style="display:none"></span>
      </button>

    </form>

  </div>
</main>

<script>
async function handleLogin(e) {
  e.preventDefault();
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value;
  if (!user || !pass) {
    showError('请填写用户名和密码');
    return;
  }
  setLoading(true);
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass })
    });
    const data = await res.json();
    if (res.ok && data.ok) {
      // 登录成功，跳转主页
      document.getElementById('login-btn').classList.add('success');
      document.getElementById('btn-text').textContent = '✓ 登录成功';
      setTimeout(() => { window.location.href = '/'; }, 600);
    } else {
      showError(data.error || '登录失败');
      shakeCard();
    }
  } catch {
    showError('网络错误，请重试');
  } finally {
    setLoading(false);
  }
}

function showError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.classList.add('visible');
}
function clearError() {
  const el = document.getElementById('login-error');
  el.classList.remove('visible');
}
function setLoading(on) {
  document.getElementById('login-btn').disabled = on;
  document.getElementById('btn-text').style.display = on ? 'none' : 'inline';
  document.getElementById('btn-spinner').style.display = on ? 'inline-block' : 'none';
}
function shakeCard() {
  const card = document.querySelector('.login-card');
  card.classList.remove('shake');
  void card.offsetWidth; // reflow
  card.classList.add('shake');
}
function togglePassword() {
  const inp = document.getElementById('password');
  const show = document.getElementById('eye-show');
  const hide = document.getElementById('eye-hide');
  if (inp.type === 'password') {
    inp.type = 'text';
    show.style.display = 'none';
    hide.style.display = 'block';
  } else {
    inp.type = 'password';
    show.style.display = 'block';
    hide.style.display = 'none';
  }
}
// Enter键提交
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-form').requestSubmit();
});
</script>
</body>
</html>
